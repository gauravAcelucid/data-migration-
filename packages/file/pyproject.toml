[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "file"
version = "0.1.0"
description = "Unified data migration package with source/target connector registry"
requires-python = ">=3.12"
dependencies = [
    "pyarrow>=14.0",
    "pandas>=2.2",
    "pydantic>=2.5",
    "psycopg>=3.2",
    "psycopg-pool>=3.2",
    "sqlalchemy>=2.0",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "motor>=3.4",
    "pymongo>=4.6",
    "boto3>=1.34",
    "botocore>=1.34",
    "pdfplumber>=0.11.0",
    "python-docx>=1.1.0",
]
